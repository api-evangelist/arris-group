description: >-
  ARRIS Group was a global telecommunications equipment company providing
  entertainment and communications solutions including broadband, video, and
  wireless products for service providers and consumers. ARRIS was acquired by
  CommScope in 2019, combining their broadband technology expertise with
  CommScope's infrastructure solutions. The combined company offers cable
  modem equipment, set-top boxes, network infrastructure, DOCSIS technology,
  and related telecommunications hardware and software platforms for cable
  operators, telcos, and internet service providers worldwide.
apis:
  - aid: arris-group:commscope-api
    name: CommScope Developer API
    description: >-
      CommScope (formerly ARRIS) provides API and integration capabilities for
      network infrastructure management, including tools for managing broadband
      devices, DOCSIS networks, and cable plant equipment through their
      CommScope NBASE-T Alliance and related technology platforms.
    humanURL: https://www.commscope.com/
